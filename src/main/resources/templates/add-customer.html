<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Customer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-sm p-4">

        <h3 class="mb-4">Add Customer</h3>

        <form id="addForm">

            <!-- NAME -->
            <div class="mb-3">
                <label class="form-label">Customer Name</label>
                <input type="text" id="customerName" class="form-control">
            </div>

            <!-- CONTACT -->
            <div class="row mb-3">
                <div class="col">
                    <label class="form-label">First Name</label>
                    <input type="text" id="contactFirstName" class="form-control">
                </div>

                <div class="col">
                    <label class="form-label">Last Name</label>
                    <input type="text" id="contactLastName" class="form-control">
                </div>
            </div>

            <!-- PHONE -->
            <div class="mb-3">
                <label class="form-label">Phone</label>
                <input type="text" id="phone" class="form-control">
            </div>

            <!-- ADDRESS -->
            <div class="row mb-3">
                <div class="col">
                    <label class="form-label">Address Line 1</label>
                    <input type="text" id="addressLine1" class="form-control">
                </div>

                <div class="col">
                    <label class="form-label">Address Line 2</label>
                    <input type="text" id="addressLine2" class="form-control">
                </div>
            </div>

            <!-- LOCATION -->
            <div class="row mb-3">
                <div class="col">
                    <label class="form-label">City</label>
                    <input type="text" id="city" class="form-control">
                </div>

                <div class="col">
                    <label class="form-label">Country</label>
                    <input type="text" id="country" class="form-control">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col">
                    <label class="form-label">State</label>
                    <input type="text" id="state" class="form-control" placeholder="Optional">
                </div>

                <div class="col">
                    <label class="form-label">Postal Code</label>
                    <input type="text" id="postalCode" class="form-control" placeholder="Optional">
                </div>
            </div>

            <!-- CREDIT -->
            <div class="mb-3">
                <label class="form-label">Credit Limit</label>
                <input type="number" id="creditLimit" class="form-control">
            </div>

            <!-- BUTTONS -->
            <div class="d-flex gap-2">
                <button id="addBtn" type="button" class="btn btn-success" onclick="addCustomer()">
                    Add
                </button>

                <button type="button" class="btn btn-secondary" onclick="history.back()">
                    Cancel
                </button>
            </div>
            <!-- Employee -->
            <div class="mb-3">
                <label class="form-label">Sales Representative</label>

                <select id="salesRepEmployeeNumber" class="form-select">
                    <option value="">Select Employee (Optional)</option>

                    <option th:each="emp : ${employees}"
                            th:value="${emp.employeeNumber}"
                            th:text="${emp.fullName}">
                    </option>
                </select>
            </div>
        </form>

    </div>

</div>

<script th:inline="javascript">
    const BASE_URL = /*[[${@environment.getProperty('backend.base-url')}]]*/ '';
</script>

<script th:src="@{/js/add-customer.js}"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
