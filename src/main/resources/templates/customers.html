<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Customers</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <h2 class="mb-4">Customer Management</h2>

    <!-- SEARCH BAR -->
    <form th:action="@{/customers}" method="get" class="mb-3">
        <div class="input-group">
            <input type="text"
                   name="keyword"
                   class="form-control"
                   placeholder="Search by name, city, or country"
                   th:value="${keyword}">
            <button class="btn btn-primary" type="submit">Search</button>
            <a th:href="@{/customers}" class="btn btn-secondary">Reset</a>
        </div>
    </form>

    <!-- TOAST -->
    <div class="position-fixed top-0 end-0 p-3" style="z-index: 1050">
        <div id="toast" class="toast align-items-center text-white border-0">
            <div class="d-flex">
                <div class="toast-body" id="toastBody"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <!-- TABLE -->
    <table class="table table-bordered table-hover shadow-sm bg-white">
        <thead class="table-dark">
        <tr>
            <th>Name</th>
            <th>Contact</th>
            <th>City</th>
            <th>Country</th>
            <th>Credit Limit</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>
        <tr th:if="${#lists.isEmpty(customers)}">
            <td colspan="6" class="text-center text-muted">
                No customers found
            </td>
        </tr>

        <tr th:each="c : ${customers}">
            <td th:text="${c.customerName}"></td>
            <td th:text="${c.contactName}"></td>
            <td th:text="${c.city}"></td>
            <td th:text="${c.country}"></td>
            <td th:text="${c.creditLimit}"></td>
            <td>
                <a th:href="@{/customers/edit/{id}(id=${c.customerNumber})}"
                   class="btn btn-sm btn-warning">
                    Update
                </a>

                <a th:href="@{/customers/view/{id}(id=${c.customerNumber})}"
                   class="btn btn-sm btn-info">
                    View
                </a>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- PAGINATION -->
    <nav>
        <ul class="pagination justify-content-center">

            <li class="page-item"
                th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/customers(page=${currentPage - 1}, keyword=${keyword})}">
                    Previous
                </a>
            </li>

            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link"
                   th:href="@{/customers(page=${i}, keyword=${keyword})}"
                   th:text="${i + 1}">
                </a>
            </li>

            <li class="page-item"
                th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/customers(page=${currentPage + 1}, keyword=${keyword})}">
                    Next
                </a>
            </li>

        </ul>
    </nav>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- TOAST TRIGGER SCRIPT -->
<script>
    document.addEventListener("DOMContentLoaded", () => {

        const params = new URLSearchParams(window.location.search);

        const toastEl = document.getElementById("toast");
        const toastBody = document.getElementById("toastBody");

        if (params.has("success")) {
            toastEl.classList.add("bg-success");
            toastBody.innerText = "Customer updated successfully";
            new bootstrap.Toast(toastEl).show();
        }

        if (params.has("error")) {
            toastEl.classList.add("bg-danger");
            toastBody.innerText = decodeURIComponent(params.get("error"));
            new bootstrap.Toast(toastEl).show();
        }

        // 🔥 Clean URL (no query params after toast)
        if (params.has("success") || params.has("error")) {
            window.history.replaceState({}, document.title, "/customers");
        }

    });
</script>

</body>
</html>
