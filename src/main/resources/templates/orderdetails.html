<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Order Details</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --bg: #f7f7f5;
            --surface: #ffffff;
            --border: #e8e8e4;
            --text-primary: #1a1a18;
            --text-secondary: #6b6b66;
            --accent: #2563eb;
            --accent-light: #eff6ff;
            --radius: 10px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            margin: 0;
        }

        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topbar-brand {
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-primary);
            font-family: 'DM Mono', monospace;
        }

        .topbar-nav a {
            font-size: 0.82rem;
            color: var(--text-secondary);
            text-decoration: none;
            margin-left: 1.5rem;
            font-weight: 500;
            transition: color 0.15s;
        }

        .topbar-nav a:hover {
            color: var(--text-primary);
        }

        .topbar-nav a.active {
            color: var(--accent);
        }

        .page-wrapper {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2.5rem 2rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-decoration: none;
            margin-bottom: 1.75rem;
            transition: color 0.15s;
        }

        .back-link:hover {
            color: var(--text-primary);
        }

        .page-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin: 0 0 0.3rem;
        }

        .page-subtitle {
            font-size: 0.82rem;
            color: var(--text-secondary);
            margin: 0;
        }

        /* Product code pill */
        .product-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.35rem 0.75rem;
            font-size: 0.78rem;
            font-family: 'DM Mono', monospace;
            color: var(--text-secondary);
        }

        .product-pill .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
        }

        .title-style {
            text-decoration: none !important;
            color: inherit;
        }

        /* Summary cards */
        .summary-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .summary-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.1rem 1.25rem;
        }

        .summary-label {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 0.4rem;
        }

        .summary-value {
            font-size: 1.4rem;
            font-weight: 600;
            font-family: 'DM Mono', monospace;
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }

        /* Table */
        .table-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
        }

        .data-table thead tr {
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }

        .data-table th {
            padding: 0.7rem 1rem;
            text-align: left;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .data-table th.align-right {
            text-align: right;
        }

        .data-table tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.1s;
        }

        .data-table tbody tr:last-child {
            border-bottom: none;
        }

        .data-table tbody tr:hover {
            background: #fafafa;
        }

        .data-table td {
            padding: 0.75rem 1rem;
            color: var(--text-primary);
            vertical-align: middle;
        }

        .data-table td.mono {
            font-family: 'DM Mono', monospace;
            font-size: 0.78rem;
        }

        .data-table td.align-right {
            text-align: right;
        }

        /* Order number badge */
        .order-badge {
            display: inline-flex;
            align-items: center;
            background: var(--accent-light);
            color: var(--accent);
            border-radius: 4px;
            padding: 0.18rem 0.5rem;
            font-size: 0.75rem;
            font-family: 'DM Mono', monospace;
            font-weight: 500;
        }

        .empty-state {
            padding: 3.5rem;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .empty-state .icon {
            font-size: 2rem;
            margin-bottom: 0.75rem;
            opacity: 0.3;
        }

        /* Pagination */
        .pagination-bar {
            display: flex;
            gap: 0.3rem;
            align-items: center;
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            background: var(--bg);
        }

        .page-btn {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.78rem;
            font-family: 'DM Mono', monospace;
            border: 1px solid var(--border);
            border-radius: 5px;
            background: var(--surface);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s;
        }

        .page-btn:hover,
        .page-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
    </style>
</head>

<body>

    <div class="topbar">
        <a th:href="@{/}" class="title-style"><span class="topbar-brand">Classic Business Model</span></a>
    </div>

    <!-- breadcrumb -->
    <div class="container mt-3">
        <nav style="font-size:0.8rem; color:#6b6b66;">
            <a th:href="@{/products}" style="text-decoration:none; color:#6b6b66;">Products</a>
            <span> / </span>
            <span th:text="${page}">Page</span>
        </nav>
    </div>

    <div class="page-wrapper">

        <a th:href="@{/products}" class="back-link">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M9 11L5 7l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
            Back to Products
        </a>

        <div class="page-header">
            <div>
                <h1 class="page-title">Order Details</h1>
                <p class="page-subtitle">Order history for product <span th:text="${productCode}"
                        style="font-family:'DM Mono',monospace;"></span></p>
            </div>
            <div class="product-pill">
                <span class="dot"></span>
                <span th:text="${productCode}">—</span>
            </div>
        </div>

        <!-- Summary cards -->
        <div class="summary-row" th:if="${totalOrders > 0}">
            <div class="summary-card">
                <div class="summary-label">Total Orders</div>
                <div class="summary-value" th:text="${totalOrders}"></div>
            </div>
        </div>

        <!-- Table -->
        <div class="table-card">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Product Name</th>
                        <th>Order #</th>
                        <th class="align-right">Qty Ordered</th>
                        <th class="align-right">Price Each</th>
                        <th class="align-right">Total Price</th>
                    </tr>
                </thead>
                
                <tbody>
                    <tr th:if="${#lists.isEmpty(orders)}">
                        <td colspan="5">
                            <div class="empty-state">
                                <div class="icon">📋</div>
                                No orders found for this product.
                            </div>
                        </td>
                    </tr>

                    <tr th:each="o : ${orders}">
                        <td><strong th:text="${o.productName}"></strong></td>

                        <td>
                            <span class="order-badge"
                                th:text="'#' + ${o.orderNumber}">
                            </span>
                        </td>

                        <td class="mono align-right"
                            th:text="${o.quantityOrdered}">
                        </td>

                        <td class="mono align-right"
                            th:text="'$' + ${#numbers.formatDecimal(o.priceEach,1,2)}">
                        </td>

                        <td class="mono align-right">
                            <strong th:text="'$' + ${#numbers.formatDecimal(o.totalPrice,1,2)}"></strong>
                        </td>
                    </tr>
                    </tbody>
            </table>

            <div class="pagination-bar" th:if="${pageData.totalPages > 1}">

                <!-- PREVIOUS -->
                <a th:if="${pageData.number > 0}"
                th:href="@{/orderdetails(productCode=${productCode}, page=${pageData.number - 1})}"
                class="page-btn">
                    ←
                </a>

                <!-- CURRENT PAGE -->
                <span class="page-btn active"
                    th:text="${pageData.number + 1}">
                </span>

                <!-- NEXT -->
                <a th:if="${pageData.number < pageData.totalPages - 1}"
                th:href="@{/orderdetails(productCode=${productCode}, page=${pageData.number + 1})}"
                class="page-btn">
                    →
                </a>

            </div>
            <div id="pagination" class="pagination-bar" style="display:none;"></div>
        </div>

    </div>
</body>

</html>
