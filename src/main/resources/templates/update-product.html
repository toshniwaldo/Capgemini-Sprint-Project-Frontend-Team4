<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Update Product</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --bg: #f7f7f5;
            --surface: #ffffff;
            --border: #e8e8e4;
            --text-primary: #1a1a18;
            --text-secondary: #6b6b66;
            --accent: #2563eb;
            --accent-light: #eff6ff;
            --warning: #d97706;
            --radius: 10px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            margin: 0;
        }

        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topbar-brand {
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-primary);
            font-family: 'DM Mono', monospace;
        }

        .topbar-nav a {
            font-size: 0.82rem;
            color: var(--text-secondary);
            text-decoration: none;
            margin-left: 1.5rem;
            font-weight: 500;
        }

        .page-wrapper {
            max-width: 680px;
            margin: 0 auto;
            padding: 2.5rem 2rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-decoration: none;
            margin-bottom: 1.75rem;
            transition: color 0.15s;
        }

        .back-link:hover {
            color: var(--text-primary);
        }

        .page-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin: 0 0 0.3rem;
        }

        .page-subtitle {
            font-size: 0.82rem;
            color: var(--text-secondary);
            margin: 0;
        }

        /* Readonly chip */
        .readonly-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            background: #fef3c7;
            color: #92400e;
            padding: 0.2rem 0.55rem;
            border-radius: 4px;
            border: 1px solid #fde68a;
        }

        .form-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
        }

        .form-section-label {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .form-divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 1.75rem 0;
        }

        label {
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--text-secondary);
            display: block;
            margin-bottom: 0.35rem;
        }

        .title-style {
            text-decoration: none !important;
            color: inherit;
        }

        .label-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.35rem;
        }

        .label-row label {
            margin: 0;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            color: var(--text-primary);
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 7px;
            padding: 0.55rem 0.75rem;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
            display: block;
        }

        input:focus,
        select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.08);
            background: #fff;
        }

        input[readonly] {
            background: #f0f0ed;
            color: var(--text-secondary);
            cursor: not-allowed;
            font-family: 'DM Mono', monospace;
            font-size: 0.8rem;
        }

        input[readonly]:focus {
            border-color: var(--border);
            box-shadow: none;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-group {
            margin-bottom: 1.1rem;
        }

        .form-footer {
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
            margin-top: 1.75rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }

        .btn-cancel {
            height: 38px;
            padding: 0 1.2rem;
            font-size: 0.82rem;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text-secondary);
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            transition: all 0.15s;
        }

        .btn-cancel:hover {
            border-color: #aaa;
            color: var(--text-primary);
        }

        .btn-submit {
            height: 38px;
            padding: 0 1.4rem;
            font-size: 0.82rem;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            background: var(--accent);
            border: none;
            border-radius: 7px;
            color: #fff;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-submit:hover {
            background: #1d4ed8;
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Loading skeleton */
        .skeleton {
            background: linear-gradient(90deg, #f0f0ee 25%, #e8e8e6 50%, #f0f0ee 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 7px;
            height: 36px;
        }

        .error-text {
            color: red;
            font-size: 0.75rem;
            margin-top: 4px;
            display: block;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }
    </style>
</head>

<body>

    <div class="topbar">
        <a th:href="@{/}" class="title-style"><span class="topbar-brand">Classic Business Model</span></a>
    </div>

    <!-- breadcrumb -->
    <div class="container mt-3">
        <nav style="font-size:0.8rem; color:#6b6b66;">
            <a th:href="@{/products}" style="text-decoration:none; color:#6b6b66;">Products</a>
            <span> / </span>
            <span th:text="${page}">Page</span>
        </nav>
    </div>

    <div class="page-wrapper">

        <a th:href="@{/products}" class="back-link">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M9 11L5 7l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
            Back to Products
        </a>

        <h1 class="page-title">Update Product</h1>
        <p style="font-size:0.82rem;color:var(--text-secondary);margin-bottom:2rem;">Edit the fields below and save
            changes</p>

        <div class="form-card">

            <form th:action="@{'/products/update/' + ${productId}}" method="post">

                <!-- Identification -->
                <div class="form-section-label">Identification</div>

                <div class="form-row">
                    <div class="form-group">
                        <div class="label-row">
                            <label>Product Code</label>
                            <span class="readonly-chip">Read-only</span>
                        </div>
                        <input type="text" name="productCode" th:value="${productId}" readonly />
                    </div>

                    <div class="form-group">
                        <div class="label-row">
                            <label>Product Line</label>
                            <span class="readonly-chip">Read-only</span>
                        </div>
                        <input type="text" name="productLine" th:value="${productLineName}" readonly />
                    </div>
                </div>

                <!-- Basic Info -->
                <div class="form-row">
                    <div class="form-group">
                        <label>Product Name</label>
                        <input type="text" name="productName" th:value="${product.productName}" required />
                    </div>

                    <div class="form-group">
                        <label>Vendor</label>
                        <input type="text" name="productVendor" th:value="${product.productVendor}" required />
                    </div>
                </div>

                <hr class="form-divider" />

                <!-- Pricing -->
                <div class="form-section-label">Pricing & Inventory</div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Quantity in Stock</label>
                        <input type="number" name="quantityInStock" min="0" th:value="${product.quantityInStock}" required />
                        <small class="error-text" id="qtyError"></small>
                    </div>
                    <div class="form-group" style="visibility:hidden"></div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Buy Price ($)</label>
                        <input type="number" step="0.01" name="buyPrice" min="0" th:value="${product.buyPrice}" required />
                        <small class="error-text" id="buyError"></small>
                    </div>

                    <div class="form-group">
                        <label>MSRP ($)</label>
                        <input type="number" step="0.01" name="MSRP" min="0" th:value="${product.MSRP}" required />
                        <small class="error-text" id="msrpError"></small>
                    </div>
                </div>

                <!-- Footer -->
                <div class="form-footer">
                    <a th:href="@{/products}" class="btn-cancel">Cancel</a>
                    <button type="submit" class="btn-submit">Save Changes</button>
                </div>

            </form>

        </div>

    </div>

    <script>

        function validateField(inputId, errorId) {
            const value = parseFloat(document.getElementById(inputId).value);
            const errorEl = document.getElementById(errorId);

            if (value < 0) {
                errorEl.textContent = "Value cannot be negative";
                return false;
            } else {
                errorEl.textContent = "";
                return true;
            }
        }

        function validateForm() {

            const v1 = validateField("quantityInStock", "qtyError");
            const v2 = validateField("buyPrice", "buyError");
            const v3 = validateField("MSRP", "msrpError");

            return v1 && v2 && v3;
        }

        // 🔥 attach to form submit
        document.querySelector("form").addEventListener("submit", function (e) {
            if (!validateForm()) {
                e.preventDefault();
            }
        });

        // 🔥 real-time validation (optional but good UX)
        ["quantityInStock", "buyPrice", "MSRP"].forEach(id => {
            document.getElementById(id).addEventListener("input", () => {
                if (id === "quantityInStock") validateField(id, "qtyError");
                if (id === "buyPrice") validateField(id, "buyError");
                if (id === "MSRP") validateField(id, "msrpError");
            });
        });

    </script>
</body>

</html>
